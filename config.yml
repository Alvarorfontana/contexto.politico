backend:
  name: github
  repo: Alvarorfontana/contexto.politico
  branch: main
  base_url: https://decap-cms-oauth-provider.vercel.app
  auth_endpoint: /api/auth

# Permite ver la vista previa de las imágenes guardadas
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "ID Único", name: "id", widget: "string" }
      - { label: "Título de la Nota", name: "title", widget: "string" }
      - { label: "Subtítulo / Bajada", name: "subtitle", widget: "text" }
      - label: "Sección / Categoría"
        name: "category"
        widget: "select"
        options:
          - "Política Nacional"
          - "Gremiales"
          - "Economía & Política"
          - "Análisis & Columnas"
          - "Latinoamérica"
          - "Estados Unidos"
          - "Europa"
          - "Medio Oriente & Asia"
      - { label: "Fecha de Publicación", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Imagen Destacada (URL o archivo)", name: "img", widget: "image" }
      - { label: "Epígrafe / Pie de Foto", name: "caption", widget: "string", required: false }
      - { label: "Contenido de la Noticia", name: "body", widget: "markdown" }
