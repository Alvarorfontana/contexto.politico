<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario Digital</title>
    
    <!-- Estilos CSS -->
    <style>
        :root {
            --color-bg: #f6f6f6;
            --color-text: #121212;
            --color-primary: #052962;
            --color-accent: #c70000;
            --color-border: #dcdcdc;
            --font-headline: 'GH Serif Heritage', Georgia, serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            line-height: 1.5;
            padding: 20px;
        }

        header {
            border-bottom: 3px solid var(--color-primary);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-family: var(--font-headline);
            font-size: 3rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Parrilla de noticias estilo portada */
        .grid-noticias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-story {
            background: #ffffff;
            border: 1px solid var(--color-border);
            border-top: 4px solid var(--color-primary);
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .card-story:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .card-story .volanta {
            color: var(--color-accent);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-story h2 {
            font-family: var(--font-headline);
            font-size: 1.4rem;
            line-height: 1.2;
            margin-bottom: 10px;
            color: #000;
        }

        .card-story p.bajada {
            font-size: 0.95rem;
            color: #444;
        }

        /* Modal / Vista flotante para nota completa */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: 4px;
            position: relative;
        }

        .btn-cerrar {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #666;
        }

        .modal-body h1 {
            font-family: var(--font-headline);
            font-size: 2.2rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body .meta {
            font-size: 0.85rem;
            color: #666;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-body img {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .modal-body .cuerpo-texto p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Noticias</h1>
    </header>

    <!-- Parrilla donde se cargan las notas desde content/noticias/ -->
    <main class="grid-noticias">
        
        <!-- Tarjeta Nota 1 -->
        <article class="card-story" onclick="abrirNota('nota-1')">
            <div class="volanta" id="volanta-nota-1">Cargando...</div>
            <h2 id="titulo-nota-1">...</h2>
            <p class="bajada" id="bajada-nota-1">...</p>
        </article>

        <!-- Tarjeta Nota 2 -->
        <article class="card-story" onclick="abrirNota('nota-2')">
            <div class="volanta" id="volanta-nota-2">Cargando...</div>
            <h2 id="titulo-nota-2">...</h2>
            <p class="bajada" id="bajada-nota-2">...</p>
        </article>

        <!-- Tarjeta Nota 3 -->
        <article class="card-story" onclick="abrirNota('nota-3')">
            <div class="volanta" id="volanta-nota-3">Cargando...</div>
            <h2 id="titulo-nota-3">...</h2>
            <p class="bajada" id="bajada-nota-3">...</p>
        </article>

    </main>

    <!-- Modal para leer la nota completa -->
    <div class="modal-overlay" id="modalNota">
        <div class="modal-content">
            <button class="btn-cerrar" onclick="cerrarNota()">&times;</button>
            <div class="modal-body" id="contenidoModal">
                <!-- Se llena dinámicamente con JS -->
            </div>
        </div>
    </div>

    <!-- Script de carga automática -->
    <script>
        const RUTA_NOTICIAS = 'content/noticias/';

        // Carga la previsualización en la portada
        async function cargarPortada(nombreArchivo) {
            try {
                const res = await fetch(`${RUTA_NOTICIAS}${nombreArchivo}.json`);
                if (!res.ok) return;
                const data = await res.json();

                if (document.getElementById(`volanta-${nombreArchivo}`)) {
                    document.getElementById(`volanta-${nombreArchivo}`).innerText = data.volanta || '';
                    document.getElementById(`titulo-${nombreArchivo}`).innerText = data.titulo || '';
                    document.getElementById(`bajada-${nombreArchivo}`).innerText = data.bajada || '';
                }
            } catch (e) {
                console.error(`Error cargando ${nombreArchivo}:`, e);
            }
        }

        // Abre la nota completa en la ventana flotante
        async function abrirNota(nombreArchivo) {
            try {
                const res = await fetch(`${RUTA_NOTICIAS}${nombreArchivo}.json`);
                if (!res.ok) return;
                const data = await res.json();

                const modalBody = document.getElementById('contenidoModal');
                
                // Formatear párrafos
                const parrafosHTML = Array.isArray(data.cuerpo) 
                    ? data.cuerpo.map(p => `<p>${p}</p>`).join('')
                    : `<p>${data.cuerpo}</p>`;

                const imagenHTML = data.imagen ? `<img src="${data.imagen}" alt="${data.titulo}">` : '';

                modalBody.innerHTML = `
                    <div class="volanta" style="color: var(--color-accent); font-weight: bold; text-transform: uppercase;">${data.volanta || ''}</div>
                    <h1>${data.titulo}</h1>
                    <div class="meta">Por ${data.autor || 'Redacción'} | ${data.fecha || ''}</div>
                    ${imagenHTML}
                    <div class="cuerpo-texto">${parrafosHTML}</div>
                `;

                document.getElementById('modalNota').classList.add('active');
            } catch (e) {
                console.error(`Error al abrir ${nombreArchivo}:`, e);
            }
        }

        function cerrarNota() {
            document.getElementById('modalNota').classList.remove('active');
        }

        // Inicializar carga de las 3 notas al entrar
        window.addEventListener('DOMContentLoaded', () => {
            cargarPortada('nota-1');
            cargarPortada('nota-2');
            cargarPortada('nota-3');
        });
    </script>
</body>
</html>
