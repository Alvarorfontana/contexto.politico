<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contexto Político - Diario Digital</title>
  <meta name="description" content="Análisis geopolítico, macroeconomía y política internacional.">
  
  <style>
    :root {
      /* Colores inspirados en The Guardian */
      --guardian-navy: #052962;       /* Azul marino de la cabecera */
      --guardian-blue: #005689;       /* Azul primario */
      --guardian-red: #c70000;        /* Noticias / Internacional */
      --guardian-orange: #e6711b;     /* Opinión */
      --guardian-sport: #00847e;      /* Deportes */
      
      --bg: #f6f6f6;
      --surface: #ffffff;
      --text: #121212;
      --muted: #666666;
      --border: #dcdcdc;
      
      --font-serif: "GH Guardian Headline", "Georgia", "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* 1. Header estilo The Guardian (Azul Marino) */
    .site-header {
      background: var(--guardian-navy);
      color: #ffffff;
      padding: 1.5rem 0 0 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 1rem;
    }

    .site-title {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      cursor: pointer;
      color: #ffffff;
      line-height: 1;
    }

    .site-tagline {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffe500; /* Amarillo característico */
    }

    /* 2. Barra de Navegación con Solapas */
    .nav-sections {
      background: var(--guardian-navy);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 0.25rem;
      overflow-x: auto;
    }

    .nav-item a {
      display: block;
      padding: 0.6rem 1rem;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      border-top: 4px solid transparent;
      transition: all 0.2s ease;
    }

    /* Colores por solapa/sección */
    .nav-item[data-sec="noticias"] a:hover,
    .nav-item[data-sec="noticias"].active a { border-top-color: var(--guardian-red); background: rgba(255,255,255,0.05); }
    
    .nav-item[data-sec="opinion"] a:hover,
    .nav-item[data-sec="opinion"].active a { border-top-color: var(--guardian-orange); background: rgba(255,255,255,0.05); }
    
    .nav-item[data-sec="deportes"] a:hover,
    .nav-item[data-sec="deportes"].active a { border-top-color: var(--guardian-sport); background: rgba(255,255,255,0.05); }

    .nav-item[data-sec="economia"] a:hover,
    .nav-item[data-sec="economia"].active a { border-top-color: var(--guardian-blue); background: rgba(255,255,255,0.05); }

    /* Layout Principal */
    main {
      padding-top: 2rem;
    }

    .grid-portada {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .grid-portada { grid-template-columns: 1fr; }
    }

    /* 3. Encabezados de Columna con Código de Color */
    .col-title {
      font-size: 1.1rem;
      font-family: var(--font-serif);
      font-weight: 800;
      border-top: 3px solid var(--guardian-navy);
      padding-top: 0.4rem;
      margin-bottom: 1.2rem;
      color: var(--guardian-navy);
    }

    .col-title.noticias-accent { border-top-color: var(--guardian-red); color: var(--guardian-red); }
    .col-title.opinion-accent { border-top-color: var(--guardian-orange); color: var(--guardian-orange); }

    /* Tarjetas de Noticia */
    .card {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .card:hover {
      background-color: #f0f0f0;
    }

    .tag {
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 0.3rem;
      color: var(--guardian-red);
    }

    .opinion-story .tag { color: var(--guardian-orange); }

    .card h2 {
      font-family: var(--font-serif);
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .lead-story h2 { font-size: 2rem; }
    .secundario-story h2 { font-size: 1.3rem; }
    .opinion-story h2 { font-size: 1.2rem; font-style: italic; }

    .card img {
