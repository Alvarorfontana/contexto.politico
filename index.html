<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexto Político | Análisis y Noticias</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f1ea;
            --guardian-navy: #052962;
            --guardian-red: #c70000;
            --text-dark: #121212;
            --text-muted: #555555;
            --border-color: #dcd6cd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); color: var(--text-dark); font-family: 'Merriweather', serif; line-height: 1.5; }

        header { background-color: var(--guardian-navy); color: #ffffff; border-bottom: 4px solid var(--guardian-red); }
        .header-top { max-width: 1300px; margin: 0 auto; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.15); font-family: 'Public Sans', sans-serif; font-size: 0.85rem; }
        .masthead { max-width: 1300px; margin: 0 auto; padding: 25px 20px 15px 20px; text-align: center; }
        .site-title { font-family: 'Public Sans', sans-serif; font-size: 3.2rem; font-weight: 800; tracking: -1px; text-transform: uppercase; color: #ffffff; text-decoration: none; display: inline-block; cursor: pointer; }

        nav { background-color: var(--guardian-navy); border-bottom: 1px solid var(--border-color); font-family: 'Public Sans', sans-serif; }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; overflow-x: auto; }
        .nav-link { color: #ffffff; text-decoration: none; padding: 10px 18px; font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .nav-link:hover { background-color: rgba(255,255,255,0.1); }

        .container { max-width: 1300px; margin: 0 auto; padding: 25px 20px; }
        .main-layout { display: grid; grid-template-columns: 2.2fr 1fr; gap: 30px; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .site-title { font-size: 2.2rem; }
        }

        .section-tag { display: inline-block; font-family: 'Public Sans', sans-serif; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; padding: 3px 8px; margin-bottom: 10px; color: #fff; background-color: var(--guardian-red); }
        .section-tag.navy { background-color: var(--guardian-navy); }

        .article-card { border-bottom: 1px solid var(--border-color); padding-bottom: 25px; margin-bottom: 25px; cursor: pointer; }
        .article-title { font-size: 2rem; font-weight: 700; line-height: 1.15; margin-bottom: 10px; color: var(--text-dark); }
        .article-title:hover { color: var(--guardian-red); }
        .article-subtitle { font-size: 1.05rem; color: var(--text-muted); font-style: italic; margin-bottom: 15px; }

        .media-container { width: 100%; height: 380px; background-color: #e0dcd3; margin-bottom: 12px; overflow: hidden; position: relative; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        .caption { font-family: 'Public Sans', sans-serif; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; }

        .sidebar-title { font-family: 'Public Sans', sans-serif; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--text-dark); padding-bottom: 5px; margin-bottom: 15px; }
        .sidebar-item { border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 12px; cursor: pointer; }
        .sidebar-item h4 { font-size: 1.1rem; line-height: 1.25; }
        .sidebar-item h4:hover { color: var(--guardian-red); }

        /* VISTA LECTOR */
        #reader-view { display: none; background: #ffffff; padding: 40px; border: 1px solid var(--border-color); max-width: 900px; margin: 0 auto; }
        .back-btn { font-family: 'Public Sans', sans-serif; font-weight: 700; color: var(--guardian-red); cursor: pointer; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 20px; display: inline-block; }
        .reader-body { font-size: 1.15rem; line-height: 1.7; margin-top: 25px; }
        .reader-body p { margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div><strong>CONTEXTO POLÍTICO</strong> | Periodismo de Análisis</div>
            <div id="current-date"></div>
        </div>
        <div class="masthead">
            <span class="site-title" onclick="showHome()">Contexto Político</span>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <a href="#" class="nav-link" onclick="showHome()">Inicio</a>
            <a href="#" class="nav-link">Política Nacional</a>
            <a href="#" class="nav-link">Economía</a>
            <a href="#" class="nav-link">Internacionales</a>
            <a href="#" class="nav-link">Análisis</a>
        </div>
    </nav>

    <div class="container">
        <!-- VISTA PORTADA -->
        <div id="home-view" class="main-layout">
            <main id="main-content"></main>
            <aside id="sidebar-content">
                <div class="sidebar-title">Más Noticias</div>
                <div id="sidebar-list"></div>
            </aside>
        </div>

        <!-- VISTA LECTOR DE ARTÍCULO COMPLETO -->
        <article id="reader-view">
            <span class="back-btn" onclick="showHome()">← Volver a la portada</span>
            <div id="reader-tag" class="section-tag"></div>
            <h1 id="reader-title" class="article-title" style="font-size: 2.5rem;"></h1>
            <p id="reader-subtitle" class="article-subtitle" style="font-size: 1.3rem;"></p>
            <div id="reader-media" class="media-container" style="height: 450px;"></div>
            <div id="reader-caption" class="caption"></div>
            <div id="reader-body" class="reader-body"></div>
        </article>
    </div>

<script>
    // Configuración de fecha
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', options);

    // Base de datos de artículos (Pre-cargada)
    const articlesData = {
        "cgt-paro": {
            id: "cgt-paro",
            badge: "Política Nacional",
            badgeColor: "red",
            title: "La CGT define la fecha del segundo paro general tras el fracaso de las negociaciones",
            subtitle: "La cúpula sindical endurece su posición frente a las medidas económicas y busca consensuar el respaldo de los gremios del transporte.",
            img: "https://images.unsplash.com/photo-1541872703-74c5e44368f9?auto=format&fit=crop&w=1200&q=80",
            caption: "Reunión de la junta directiva en la sede de la calle Azopardo.",
            body: `<p>La Confección General del Trabajo (CGT) atraviesa un momento decisivo. Tras intensas semanas de debate interno, los sectores más duros e industriales han logrado imponer la necesidad de coordinar una nueva medida de fuerza a nivel nacional.</p>
                   <p>Fuentes cercanas al consejo directivo confirmaron que la definición de la fecha no pasará de esta semana. El principal punto de discusión radica en la adhesión de la Unión Tranviarios Automotor (UTA), insumo clave para garantizar el acatamiento total en las principales urbes del país.</p>
                   <p>Mientras tanto, desde el Gobierno nacional mantienen la postura de no ceder ante las presiones gremiales, ratificando el rumbo fijado en las reformas estructurales proyectadas para la segunda mitad del año.</p>`
        }
    };

    function renderArticles() {
        const mainContent = document.getElementById('main-content');
        const sidebarList = document.getElementById('sidebar-list');
        
        mainContent.innerHTML = '';
        sidebarList.innerHTML = '';

        const keys = Object.keys(articlesData);
        if(keys.length === 0) return;

        // Nota principal (Primera)
        const mainArt = articlesData[keys[0]];
        mainContent.innerHTML = `
            <div class="article-card" onclick="openArticle('${mainArt.id}')">
                <span class="section-tag ${mainArt.badgeColor === 'navy' ? 'navy' : ''}">${mainArt.badge}</span>
                <h2 class="article-title">${mainArt.title}</h2>
                <p class="article-subtitle">${mainArt.subtitle}</p>
                ${mainArt.img ? `<div class="media-container"><img src="${mainArt.img}" alt="Imagen noticia"></div>` : ''}
                ${mainArt.caption ? `<div class="caption">${mainArt.caption}</div>` : ''}
            </div>
        `;

        // Lateral (Siguientes)
        for(let i = 1; i < keys.length; i++) {
            const art = articlesData[keys[i]];
            sidebarList.innerHTML += `
                <div class="sidebar-item" onclick="openArticle('${art.id}')">
                    <span class="section-tag ${art.badgeColor === 'navy' ? 'navy' : ''}">${art.badge}</span>
                    <h4>${art.title}</h4>
                </div>
            `;
        }
    }

    function openArticle(id) {
        const art = articlesData[id];
        if(!art) return;

        document.getElementById('reader-tag').innerText = art.badge;
        document.getElementById('reader-title').innerText = art.title;
        document.getElementById('reader-subtitle').innerText = art.subtitle;
        
        const mediaContainer = document.getElementById('reader-media');
        if(art.img) {
            mediaContainer.style.display = 'block';
            mediaContainer.innerHTML = `<img src="${art.img}" alt="Imagen noticia">`;
        } else {
            mediaContainer.style.display = 'none';
        }

        document.getElementById('reader-caption').innerText = art.caption || '';
        document.getElementById('reader-body').innerHTML = art.body;

        document.getElementById('home-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function showHome() {
        document.getElementById('reader-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'grid';
        window.scrollTo(0, 0);
    }

    // Carga dinámica de notas desde GitHub para tu usuario Alvarorfontana
    async function loadNewsFromGitHub() {
        try {
            const response = await fetch('https://api.github.com/repos/Alvarorfontana/contexto-politico/contents/content/noticias');
            if(!response.ok) return;
            
            const files = await response.json();
            for (let file of files) {
                if(file.name.endsWith('.json')) {
                    const res = await fetch(file.download_url);
                    const article = await res.json();
                    articlesData[article.id] = article;
                }
            }
            renderArticles();
        } catch (error) {
            console.log('Cargando con noticias locales.');
        }
    }

    window.onload = () => {
        renderArticles();
        loadNewsFromGitHub();
    };
</script>
</body>
</html>
